<section class="page">
  <header class="page__header">
    <div>
      <p class="eyebrow">Acceso restringido</p>
      <h1>No estás autorizado</h1>
      <p class="hint">Tu sesión no tiene permisos para continuar.</p>
    </div>
    <div class="badge badge--locked">Sin acceso</div>
  </header>

  <div class="card">
    <div class="card__body">
      <div class="notice">
        <div class="notice__icon">!</div>
        <div class="notice__content">
          <p class="message">
            Verifica tu enlace o solicita acceso a tu ejecutivo.
          </p>
          <p class="submessage">
            Si crees que es un error, vuelve a intentar más tarde o contacta a soporte.
          </p>
        </div>
      </div>
      <div class="actions">
        <button type="button" class="back-button" onclick="history.back()">Volver</button>
        <a class="btn-primary" href="/">Ir al inicio</a>
      </div>
    </div>
  </div>
</section>
