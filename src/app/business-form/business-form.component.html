<section class="page">
  <div class="page__actions">
    <button class="back-button" type="button" (click)="goBack()">
      ← Volver
    </button>
  </div>
  <header class="page__header">
    <div>
      <p class="eyebrow">Cliente</p>
      <h1>{{ advertiserName || clientId }}</h1>
      <p class="meta">Negocio: {{ businessId }}</p>
      @if (commercialName) {
      <p class="meta">Nombre comercial: {{ commercialName }}</p>
      }
    </div>
    @if (formSchema$ | async; as schema) {
    <div [ngClass]="statusContainerClass(schema.status)">
      <span class="status-pill" [ngClass]="statusClass(schema.status)">
        {{ statusLabel(schema.status) }}
      </span>
    </div>
    } @else {
    <div class="badge badge--draft">
      <span>Draft</span>
    </div>
    }
  </header>

  @if (formSchema$ | async; as schema) {
  <div class="card">
    <app-dynamic-form [schema]="schema" (submitForm)="handleSubmit($event)" />
  </div>
  } @else {
  <p class="loading">Cargando esquema...</p>
  }
</section>
