<section class="page">
  <div class="page__actions">
    <button class="back-button" type="button" (click)="goBack()">
      ← Volver
    </button>
  </div>
  <header class="page__header">
    <div>
      <p class="eyebrow">Cliente</p>
      <h1>{{ advertiserName || clientId }}</h1>
      <p class="meta">Negocio: {{ businessId }}</p>
      @if (commercialName) {
      <p class="meta">Nombre comercial: {{ commercialName }}</p>
      }
    </div>
    @if (formSchema$ | async; as schema) {
    <span
      class="status"
      [attr.data-variant]="statusVariant(schema.status)"
      [ngClass]="badgeClasses(schema.status)"
    >
      {{ statusLabel(schema.status) }}
    </span>
    } @else {
    <span class="status" data-variant="DRAFT" [ngClass]="badgeClasses('DRAFT')">Draft</span>
    }
  </header>

  @if (formSchema$ | async; as schema) {
  <div class="card">
    <app-dynamic-form [schema]="schema" [userRole]="userRole" (submitForm)="handleSubmit($event)" />
  </div>
  } @else {
  <p class="loading">Cargando esquema...</p>
  }
</section>
