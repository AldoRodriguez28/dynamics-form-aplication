<div class="field-wrapper">
  <div class="field-label-row">
    <div class="field-label">
      <p class="eyebrow">Lista</p>
      <div class="field-title-row">
        <span class="field-title">{{ field.label }}</span>
        @if (field.required) { <span class="required">Obligatorio</span> }
      </div>
      @if (field.placeholder) {
        <p class="help">{{ field.placeholder }}</p>
      }
    </div>
    <div class="label-actions">
      <span class="pill">{{ options.length }} opción(es)</span>
    </div>
  </div>

  <div class="array-card">
    <div class="array-card__header">
      <div class="array-card__lead">
        <div class="avatar">✓</div>
        <div>
          <p class="array-card__eyebrow">Selección múltiple</p>
          <p class="array-card__title">{{ field.label }}</p>
        </div>
      </div>
    </div>

    <div class="checkbox-grid">
      @for (opt of options; track opt.value) {
        <label class="checkbox-item">
          <input
            type="checkbox"
            [checked]="isChecked(opt.value)"
            (change)="onChange($event, opt.value)"
          />
          <span>{{ opt.label }}</span>
        </label>
      }
    </div>
  </div>
</div>
