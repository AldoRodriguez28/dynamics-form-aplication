<div class="fps-card" [class.fps-card--error]="showFieldError">
  <div class="fps-head">
    <div>
      <p class="fps-eyebrow">Tags</p>
      <p class="fps-title">{{ field.label }}</p>
      @if (field.placeholder) {
      <p class="fps-help">{{ field.placeholder }}</p>
      }
    </div>
    <span class="fps-count">{{ items.length }} items</span>
  </div>

  <div class="fps-pills">
    @for (tag of items; track tag; let idx = $index) {
    <button type="button" class="fps-pill fps-pill--active" (click)="toggleTag(tag)" [disabled]="readOnly">
      <span>{{ tag }}</span>
      @if (!readOnly) {
      <span class="fps-pill__close" (click)="removeTag(idx); $event.stopPropagation()">×</span>
      }
    </button>
    }
  </div>

  @if (fieldErrorHint) {
  <p class="fps-field-error" role="alert">{{ fieldErrorHint }}</p>
  }

  <div class="fps-input-row">
    <input
      class="fps-input"
      [class.fps-input--error]="showFieldError"
      type="text"
      [placeholder]="field.placeholder || 'Escribe y presiona agregar...'"
      [(ngModel)]="newTag"
      [disabled]="readOnly"
      (keydown.enter)="$event.preventDefault(); addTag()"
    />
    <button type="button" class="fps-add" (click)="addTag()" [disabled]="readOnly">Agregar</button>
  </div>
</div>
