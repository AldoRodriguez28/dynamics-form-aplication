<div class="field-wrapper">
  <label class="field-label" [for]="field.name">
    {{ field.label }}
    @if (field.required) { <span class="required">*</span> }
  </label>
  <input
    type="file"
    class="field-control"
    [id]="field.name"
    [attr.accept]="acceptFormats"
    [disabled]="readOnly"
    (change)="onFileChange($event)"
  />
  @if (uploading) {
    <p class="status info">Subiendo archivo...</p>
  }
  @if (uploadSuccess) {
    <p class="status success">Archivo subido correctamente.</p>
  }
  @if (uploadError) {
    <p class="status error">{{ uploadError }}</p>
  }
  @if (currentName) {
    <p class="file-hint">Archivo actual: {{ currentName }}</p>
  }
  @if (previewUrl) {
    <div class="preview">
      <img [src]="previewUrl" alt="Vista previa" />
    </div>
  }
  @if (field.placeholder) {
    <p class="help">{{ field.placeholder }}</p>
  }
</div>
