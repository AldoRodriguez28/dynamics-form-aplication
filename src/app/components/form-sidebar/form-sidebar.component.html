<nav class="sidebar">
  <div class="sidebar__header">
    <p class="sidebar__eyebrow">Avance</p>
    <p class="sidebar__title">Formulario maestro</p>
  </div>

  <div class="sidebar__list">
    @for (block of blocks; track block.code) {
    <div class="sidebar__row">
      <button type="button" class="sidebar__item" (click)="onSelect(block.code)">
        <div class="sidebar__item-head">
          <div class="sidebar__info">
            <p class="sidebar__block-title">{{ block.title }}</p>
            <p class="sidebar__meta">
              {{ filledCount(block.code) }} / {{ block.fieldCount }} campos
            </p>
          </div>
          <span class="sidebar__status" [ngClass]="statusClass(block.code, block.fieldCount)"></span>
        </div>
        <div class="sidebar__progress-track">
          <div
            class="sidebar__progress-fill"
            [style.width.%]="block.fieldCount ? (filledCount(block.code) / block.fieldCount) * 100 : 0">
          </div>
        </div>
      </button>
    </div>
    }
  </div>
</nav>
