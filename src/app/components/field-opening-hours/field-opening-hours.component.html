<div class="field-wrapper">
  <div class="field-label-row">
    <div class="field-label">
      <p class="eyebrow">Horario</p>
      <div class="field-title-row">
        <span class="field-title">{{ field.label }}</span>
        @if (field.required) { <span class="required">Obligatorio</span> }
      </div>
      @if (field.placeholder) {
        <p class="help">{{ field.placeholder }}</p>
      }
    </div>
  </div>

  <div class="opening-grid">
    @for (dia of dias; track dia) {
    <div class="opening-row">
      <div class="opening-day">{{ dia }}</div>
      @for (campo of campos; track campo) {
      <div class="opening-field">
        <label class="sub-label" [for]="field.name + '-' + dia + '-' + campo">{{ campo | titlecase }}</label>
        <input
          class="field-control"
          type="time"
          [id]="field.name + '-' + dia + '-' + campo"
          [value]="valueFor(dia, campo)"
          [disabled]="readOnly"
          (input)="updateValue(dia, campo, $any($event.target).value)"
        />
      </div>
      }
    </div>
    }
  </div>
</div>
